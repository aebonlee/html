        function setCookie(name, value, days) {
            const d = new Date();
            d.setTime(d.getTime() + days * 86400000);
            document.cookie = name + '=' + value + ';expires=' + d.toUTCString() + ';path=/;SameSite=Lax';
        }
        function getCookie(name) {
            const m = document.cookie.match('(^|;)\\s*' + name + '=([^;]*)');
            return m ? m[2] : null;
        }

        function t(key) { return strings[language][key] || key; }

        // ===== Theme Init =====
        function initTheme() {
            const saved = getCookie('themeMode');
            if (saved) themeMode = saved;
            const savedColor = getCookie('colorTheme');
            if (savedColor) colorTheme = savedColor;
            const savedLang = getCookie('language');
            if (savedLang) language = savedLang;
            applyTheme();
            applyColor();
        }

        function applyTheme() {
            if (themeMode === 'auto') {
                const hour = new Date().getHours();
                isDarkMode = hour < 6 || hour >= 20;
            } else {
                isDarkMode = themeMode === 'dark';
            }
            document.documentElement.classList.toggle('dark', isDarkMode);
            document.documentElement.setAttribute('data-theme', isDarkMode ? 'dark' : 'light');
        }

        function applyColor() {
            document.documentElement.setAttribute('data-color', colorTheme === 'blue' ? '' : colorTheme);
            if (colorTheme === 'blue') document.documentElement.removeAttribute('data-color');
        }

        function cycleTheme() {
            const modes = ['auto', 'light', 'dark'];
            themeMode = modes[(modes.indexOf(themeMode) + 1) % 3];
            setCookie('themeMode', themeMode, 365);
            applyTheme();
            render();
        }

        function setColor(c) {
            colorTheme = c;
            setCookie('colorTheme', c, 365);
            applyColor();
            colorPickerOpen = false;
            render();
        }

        // ===== Data Helpers =====
        function getData() { return glossaryData[language]; }

        function getAllTermsFlat() {
            const result = [];
            getData().forEach((cat, ci) => {
                cat.terms.forEach((term, ti) => {
                    result.push({ ...term, categoryName: cat.categoryName, ci, ti });
                });
            });
            return result;
        }

        function filterTerms(terms) {
            if (!searchTerm.trim()) return terms;
            const q = searchTerm.toLowerCase();
            return terms.filter(t =>
                t.name.toLowerCase().includes(q) ||
                t.description.toLowerCase().includes(q)
            );
        }

        function getGroups() {
            const data = getData();
            const groupOrder = [];
            const groupMap = {};
            data.forEach((cat, ci) => {
                const groupMatch = cat.categoryName.match(/^(.*?)\s*[-–]\s*\d/);
                const group = groupMatch ? groupMatch[1].trim() : cat.categoryName;
                if (!groupMap[group]) {
                    groupOrder.push(group);
                    groupMap[group] = [];
                }
                groupMap[group].push({ cat, ci });
            });
            return { groupOrder, groupMap };
        }

        function getTotalTerms() {
            let count = 0;
            getData().forEach(cat => { count += cat.terms.length; });
            return count;
        }

        function getCodeExampleCount() {
            let count = 0;
            getData().forEach(cat => {
                cat.terms.forEach(term => { if (term.codeExample) count++; });
            });
            return count;
        }

        // ===== Search Highlighting =====
        function highlightText(text, query) {
            if (!query || !query.trim()) return text;
            const q = query.trim().replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            return text.replace(new RegExp('(' + q + ')', 'gi'), '<mark>$1</mark>');
        }

        function getThemeIcon() {
            if (themeMode === 'auto') return icons.auto;
            if (themeMode === 'dark') return icons.moon;
            return icons.sun;
        }

        // ===== Render =====
        function render() {
            const root = document.getElementById('root');
            let html = '';

            if (currentPage === 'vibecoding') {
                html = renderVibeCodingView();
            } else if (currentPage === 'webprog') {
                html = renderWebProgView();
            } else if (currentPage === 'qa') {
                html = renderQAView();
            } else if (currentPage === 'edu') {
                html = renderEduView();
            } else if (selectedTerm) {
                html = renderDetailView();
            } else {
                html = renderGridView();
            }

            root.innerHTML = html;
            attachEvents();
            initScrollAnimations();

            // Update URL hash
            updateHash();
        }

        // ===== Navbar =====
        function renderNavbar() {
            const { groupOrder } = getGroups();

            let navLinksHtml = '';
            navLinksHtml += '<button class="nav-link' + (currentPage === 'vibecoding' ? ' active' : '') + '" data-page="vibecoding">Vibe Coding</button>';
            navLinksHtml += '<button class="nav-link' + (currentPage === 'webprog' ? ' active' : '') + '" data-page="webprog">Web Programming</button>';

            groupOrder.forEach((g, i) => {
                const isActive = currentPage === 'home' && !selectedTerm && selectedGroup === i;
                navLinksHtml += '<button class="nav-link header-group-tab' + (isActive ? ' active' : '') + '" data-gi="' + i + '">' + g + '</button>';
            });

            navLinksHtml += '<button class="nav-link' + (currentPage === 'qa' ? ' active' : '') + '" data-page="qa">Q&amp;A</button>';
            navLinksHtml += '<button class="nav-link' + (currentPage === 'edu' ? ' active' : '') + '" data-page="edu">' + t('applyEdu') + '</button>';

            const colorDots = ['blue', 'red', 'green', 'purple', 'orange'].map(c =>
                '<button class="color-dot color-dot-' + c + (colorTheme === c ? ' active' : '') + '" data-color="' + c + '" title="' + c + '"></button>'
            ).join('');

            return '<nav class="navbar" id="mainNavbar">' +
                '<div class="navbar-inner">' +
                    '<button class="navbar-brand" id="homeBtn">' +
                        '<span class="brand-dream">Dream</span>' +
                        '<span class="brand-it">IT</span>' +
                        '<span class="brand-sub">Glossary</span>' +
                    '</button>' +
                    '<div class="nav-links">' + navLinksHtml + '</div>' +
                    '<div class="nav-actions">' +
                        '<button class="nav-action-btn' + (searchModalOpen ? ' active' : '') + '" id="searchToggle" title="Search (Ctrl+K)">' + icons.search + '</button>' +
                        '<button class="nav-lang-btn" id="langToggle">' + (language === 'ko' ? 'EN' : 'KO') + '</button>' +
                        '<button class="nav-action-btn theme-toggle-icon" id="themeToggle" title="Theme: ' + themeMode + '">' + getThemeIcon() + '</button>' +
                        '<div class="color-picker">' +
                            '<button class="color-picker-btn" id="colorPickerBtn" title="Color Theme"></button>' +
                            '<div class="color-picker-dropdown' + (colorPickerOpen ? ' open' : '') + '" id="colorPickerDropdown">' + colorDots + '</div>' +
                        '</div>' +
                        '<button class="hamburger-btn" id="hamburgerBtn">' + icons.menu + '</button>' +
                    '</div>' +
                '</div>' +
            '</nav>';
        }

        // ===== Search Modal =====
        function renderSearchModal() {
            if (!searchModalOpen) return '';
            const allTerms = getAllTermsFlat();
            const sq = searchTerm.trim().toLowerCase();
            let results = sq ? allTerms.filter(t =>
                t.name.toLowerCase().includes(sq) || t.description.toLowerCase().includes(sq)
            ).slice(0, 12) : allTerms.slice(0, 8);

            let resultsHtml = results.map(term => {
                const name = sq ? highlightText(term.name, searchTerm) : term.name;
                const catName = term.categoryName.replace(/^.*?[-–]\s*\d+\)\s*/, '');
                return '<div class="search-result-item" data-ci="' + term.ci + '" data-ti="' + term.ti + '">' +
                    '<div class="search-result-name">' + name + '</div>' +
                    '<div class="search-result-category">' + catName + '</div>' +
                '</div>';
            }).join('');

            if (sq && results.length === 0) {
                resultsHtml = '<div style="padding:32px;text-align:center;color:var(--text-muted);font-size:14px;">' + t('noTermsFound') + '</div>';
            }

            return '<div class="search-modal-overlay open" id="searchModalOverlay">' +
                '<div class="search-modal">' +
                    '<div style="position:relative">' +
                        '<span style="position:absolute;left:20px;top:50%;transform:translateY(-50%);color:var(--text-muted)">' + icons.search + '</span>' +
                        '<input class="search-modal-input" id="searchModalInput" type="text" placeholder="' + t('searchModalPlaceholder') + '" value="' + searchTerm + '" autofocus />' +
                    '</div>' +
                    '<div class="search-modal-results scrollbar-thin">' + resultsHtml + '</div>' +
                '</div>' +
            '</div>';
        }

        // ===== Mobile Drawer =====
        function renderMobileDrawer() {
            if (!mobileMenuOpen) return '';
            const { groupOrder, groupMap } = getGroups();
            let menuHtml = '';

            menuHtml += '<button class="mobile-menu-item' + (currentPage === 'vibecoding' ? ' active' : '') + '" data-page="vibecoding">Vibe Coding</button>';
            menuHtml += '<button class="mobile-menu-item' + (currentPage === 'webprog' ? ' active' : '') + '" data-page="webprog">Web Programming</button>';

            groupOrder.forEach((g, i) => {
                const cats = groupMap[g];
                menuHtml += '<details class="group">' +
                    '<summary class="mobile-menu-item" style="display:flex;align-items:center;justify-content:space-between;list-style:none;cursor:pointer;">' +
                        g +
                        '<svg class="w-4 h-4 transition-transform group-open:rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>' +
                    '</summary>' +
                    '<div>';

        // ===== Sidebar Builder =====
        function buildSidebarHtml(data, sq) {
            let html = '';
            let lastGroup = '';
            data.forEach((cat, ci) => {
                const matchingTerms = sq ? cat.terms.filter(t =>
                    t.name.toLowerCase().includes(sq) || t.description.toLowerCase().includes(sq)
                ) : null;
                if (sq && matchingTerms.length === 0) return;

                const isExpanded = sq ? true : expandedCategoryIndex === ci;
                const isActive = selectedCategoryIndex === ci;

                const groupMatch = cat.categoryName.match(/^(.*?)\s*[-–]\s*\d/);
                const group = groupMatch ? groupMatch[1].trim() : '';
                if (group && group !== lastGroup) {
                    if (lastGroup !== '') html += '<div style="margin-top:16px"></div>';
                    html += '<div class="sidebar-group-label"><span>' + group + '</span></div>';
                }
                lastGroup = group;

                html += '<div>' +
                    '<button class="sidebar-cat-btn category-btn' + (isActive ? ' active' : (isExpanded ? ' expanded' : '')) + '" data-ci="' + ci + '">' +
                        '<span style="text-align:left;line-height:1.4">' + cat.categoryName.replace(/^.*?[-–]\s*\d+\)\s*/, '') + '</span>' +
                        '<svg class="w-3.5 h-3.5 flex-shrink-0 transition-transform' + (isExpanded ? ' rotate-180' : '') + '" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>' +
                    '</button>';

                if (isExpanded) {
                    html += '<div class="sidebar-terms">';
                    cat.terms.forEach((term, ti) => {
                        if (sq && !term.name.toLowerCase().includes(sq) && !term.description.toLowerCase().includes(sq)) return;
                        const isTermActive = selectedCategoryIndex === ci && selectedTermIndex === ti;
                        html += '<button class="sidebar-term-btn term-btn' + (isTermActive ? ' active' : '') + '" data-ci="' + ci + '" data-ti="' + ti + '">' +
                            (sq ? highlightText(term.name, searchTerm) : term.name) +

                    });
                    html += '</div>';
                }

                html += '</div>';
            });
            return html;
        }

            ] : [

                { q: 'What is the difference between a component and an element?', a: 'An element is the smallest UI piece (like an HTML tag), while a component is a reusable UI block that combines multiple elements to perform a specific function. Example: a button is an element, a search bar is a component.' },

            const faqHtml = faqs.map((faq, i) =>

                    '<h2 style="font-size:24px;font-weight:800;color:var(--text-primary);margin-bottom:8px" class="fade-up">' + t('qaTitle') + '</h2>' +
                    '<p style="color:var(--text-muted);margin-bottom:32px" class="fade-up">' + t('qaSubtitle') + '</p>' +
                    faqHtml +

                renderFooter() +

        }

        // ===== Education View =====

                { badge: '중급', title: 'UI/UX 디자인 with AI', desc: '사용자 중심 설계 원칙과 AI 도구를 활용한 효율적인 UI/UX 디자인 방법을 학습합니다.', features: ['UX 리서치 및 사용자 분석', 'UI 컴포넌트 설계 패턴', 'AI 기반 디자인 워크플로', '반응형 디자인 실습'] },

            }).join('');

            return '<div class="page-content no-hero">' +
                renderNavbar() +
                renderSearchModal() +
                renderMobileDrawer() +
                '<div class="info-page">' +
                    '<h2 style="font-size:24px;font-weight:800;color:var(--text-primary);margin-bottom:8px" class="fade-up">' + t('eduTitle') + '</h2>' +
                    '<p style="color:var(--text-muted);margin-bottom:32px" class="fade-up">' + t('eduSubtitle') + '</p>' +
                    '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;margin-bottom:40px">' + coursesHtml + '</div>' +
                    '<div class="info-card fade-up" style="padding:28px">' +
                        '<h3 style="font-size:18px;font-weight:700;color:var(--text-primary);margin-bottom:8px">' + t('eduContact') + '</h3>' +
                        '<p style="font-size:14px;color:var(--text-secondary);margin-bottom:20px">' + t('eduContactDesc') + '</p>' +
                        '<div style="display:flex;flex-direction:column;gap:12px">' +
                            '<div style="display:flex;align-items:center;gap:10px;color:var(--text-secondary)">' + icons.mail + ' <span>aebon@dreamitbiz.com</span></div>' +
                            '<div style="display:flex;align-items:center;gap:10px;color:var(--text-secondary)">' + icons.phone + ' <span>010-3700-0629</span></div>' +
                            '<div style="display:flex;align-items:center;gap:10px;color:var(--text-secondary)"><svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg> <span>' + (k ? '카카오톡: aebon' : 'KakaoTalk: aebon') + '</span></div>' +
                            '<div style="display:flex;align-items:center;gap:10px;color:var(--text-muted);font-size:13px"><svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg> <span>' + (k ? '평일: 09:00 ~ 18:00' : 'Weekdays: 09:00 ~ 18:00') + '</span></div>' +
                        '</div>' +

        // ===== URL Hash Routing =====
        function updateHash() {
            let hash = '';
            if (currentPage === 'vibecoding') hash = '#page=vibecoding';
            else if (currentPage === 'webprog') hash = '#page=webprog';
            else if (currentPage === 'qa') hash = '#page=qa';
            else if (currentPage === 'edu') hash = '#page=edu';
            else if (selectedTerm && selectedCategoryIndex !== null && selectedTermIndex !== null) {
                hash = '#term=' + encodeURIComponent(selectedTerm.name);
            }
            if (hash && window.location.hash !== hash) {
                history.pushState(null, '', hash);
            } else if (!hash && window.location.hash) {
                history.pushState(null, '', window.location.pathname);
            }
        }

        function handleHash() {
            const hash = window.location.hash;
            if (!hash) return;
            const params = {};
            hash.slice(1).split('&').forEach(p => {
                const [k, v] = p.split('=');
                if (k && v) params[k] = decodeURIComponent(v);
            });

            if (params.page) {
                const valid = ['vibecoding', 'webprog', 'qa', 'edu'];
                if (valid.includes(params.page)) {
                    currentPage = params.page;
                    if (params.page === 'vibecoding') showVibeCodingInfo = true;
                }
            } else if (params.term) {
                const allTerms = getAllTermsFlat();
                const found = allTerms.find(t => t.name === params.term);
                if (found) {
                    selectedCategoryIndex = found.ci;
                    expandedCategoryIndex = found.ci;
                    selectedTermIndex = found.ti;
                    selectedTerm = getData()[found.ci].terms[found.ti];
                    currentPage = 'home';
                }
            }
        }

        // ===== Scroll Animations =====
        function initScrollAnimations() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, { threshold: 0.1, rootMargin: '0px 0px -30px 0px' });

            document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));
        }

        // ===== Scroll Detection for Navbar =====
        let lastScrollY = 0;
        window.addEventListener('scroll', () => {
            const navbar = document.getElementById('mainNavbar');
            if (navbar) {
                navbar.classList.toggle('scrolled', window.scrollY > 20);
            }
        }, { passive: true });

        // ===== Keyboard Shortcuts =====
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                e.preventDefault();
                searchModalOpen = !searchModalOpen;
                searchTerm = '';
                render();
                if (searchModalOpen) {
                    setTimeout(() => {
                        const input = document.getElementById('searchModalInput');
                        if (input) input.focus();
                    }, 100);
                }
            }
            if (e.key === 'Escape') {
                if (searchModalOpen) { searchModalOpen = false; searchTerm = ''; render(); }
                if (mobileMenuOpen) { mobileMenuOpen = false; render(); }
            }
        });

        // ===== Event Handlers =====
        function attachEvents() {
            // Grid cards
            document.querySelectorAll('.grid-card').forEach(card => {
                card.addEventListener('click', () => {
                    selectTerm(parseInt(card.dataset.ci), parseInt(card.dataset.ti));
                });
            });

            // Header group tabs
            document.querySelectorAll('.header-group-tab').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    selectedGroup = parseInt(btn.dataset.gi);
                    gridCategory = null;
                    currentPage = 'home';
                    selectedTerm = null;
                    selectedCategoryIndex = null;
                    expandedCategoryIndex = null;
                    selectedTermIndex = null;
                    render();
                });
            });

            // Mobile group tabs
            document.querySelectorAll('.group-tab-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    selectedGroup = parseInt(btn.dataset.gi);
                    gridCategory = null;
                    render();
                });
            });

            // Subcategory chips
            document.querySelectorAll('.subcategory-chip, .subnav-tab[data-ci]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const ci = parseInt(btn.dataset.ci);
                    const giAttr = btn.dataset.gi;
                    if (giAttr !== undefined) selectedGroup = parseInt(giAttr);
                    gridCategory = ci;
                    currentPage = 'home';
                    selectedTerm = null;
                    selectedCategoryIndex = null;
                    expandedCategoryIndex = null;
                    selectedTermIndex = null;
                    mobileMenuOpen = false;
                    render();
                });
            });

            // Sidebar category buttons
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const ci = parseInt(btn.dataset.ci);
                    expandedCategoryIndex = expandedCategoryIndex === ci ? null : ci;
                    render();
                });
            });

            // Sidebar term buttons
            document.querySelectorAll('.term-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    selectTerm(parseInt(btn.dataset.ci), parseInt(btn.dataset.ti));
                });
            });

            // Mobile category dropdown
            const mobileCatDrop = document.getElementById('mobileCategoryDropdown');
            if (mobileCatDrop) {
                mobileCatDrop.addEventListener('change', (e) => {
                    const ci = parseInt(e.target.value);
                    const data = getData();
                    selectedCategoryIndex = ci;
                    expandedCategoryIndex = ci;
                    selectedTermIndex = 0;
                    selectedTerm = data[ci].terms[0];
                    render();
                });
            }

            const mobileTermDrop = document.getElementById('mobileTermDropdown');
            if (mobileTermDrop) {
                mobileTermDrop.addEventListener('change', (e) => {
                    const ti = parseInt(e.target.value);
                    const data = getData();
                    selectedTermIndex = ti;
                    selectedTerm = data[selectedCategoryIndex].terms[ti];
                    render();
                });
            }

            // Search inputs
            ['searchModalInput', 'mobileSearch'].forEach(id => {
                const el = document.getElementById(id);
                if (!el) return;
                let composing = false;
                el.addEventListener('compositionstart', () => { composing = true; });
                el.addEventListener('compositionend', (e) => {
                    composing = false;
                    searchTerm = e.target.value;
                    render();
                    setTimeout(() => {
                        const refocus = document.getElementById(id);
                        if (refocus) { refocus.focus(); refocus.setSelectionRange(searchTerm.length, searchTerm.length); }
                    }, 0);
                });
                el.addEventListener('input', (e) => {
                    if (composing) return;
                    searchTerm = e.target.value;
                    render();
                    setTimeout(() => {
                        const refocus = document.getElementById(id);
                        if (refocus) { refocus.focus(); refocus.setSelectionRange(searchTerm.length, searchTerm.length); }
                    }, 0);
                });
            });

            // Search result items
            document.querySelectorAll('.search-result-item').forEach(item => {
                item.addEventListener('click', () => {
                    const ci = parseInt(item.dataset.ci);
                    const ti = parseInt(item.dataset.ti);
                    searchModalOpen = false;
                    searchTerm = '';
                    selectTerm(ci, ti);
                });
            });

            // Search toggle
            const searchToggle = document.getElementById('searchToggle');
            if (searchToggle) {
                searchToggle.addEventListener('click', () => {
                    searchModalOpen = !searchModalOpen;
                    searchTerm = '';
                    render();
                    if (searchModalOpen) {
                        setTimeout(() => {
                            const input = document.getElementById('searchModalInput');
                            if (input) input.focus();
                        }, 100);
                    }
                });
            }

            // Search modal overlay
            const searchOverlay = document.getElementById('searchModalOverlay');
            if (searchOverlay) {
                searchOverlay.addEventListener('click', (e) => {
                    if (e.target === searchOverlay) {
                        searchModalOpen = false;
                        searchTerm = '';
                        render();
                    }
                });
            }

            // Theme toggle
            const themeToggle = document.getElementById('themeToggle');
            if (themeToggle) themeToggle.addEventListener('click', cycleTheme);

            // Language toggle
            const langToggle = document.getElementById('langToggle');
            if (langToggle) langToggle.addEventListener('click', toggleLanguage);

            // Home button
            const homeBtn = document.getElementById('homeBtn');
            if (homeBtn) homeBtn.addEventListener('click', goHome);

            // Color picker
            const colorPickerBtn = document.getElementById('colorPickerBtn');
            if (colorPickerBtn) {
                colorPickerBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    colorPickerOpen = !colorPickerOpen;
                    render();
                });
            }
            document.querySelectorAll('.color-dot').forEach(dot => {
                dot.addEventListener('click', (e) => {
                    e.stopPropagation();
                    setColor(dot.dataset.color);
                });
            });

            // Close color picker on outside click
            document.addEventListener('click', () => {
                if (colorPickerOpen) { colorPickerOpen = false; render(); }
            });

            // Hamburger
            const hamburgerBtn = document.getElementById('hamburgerBtn');
            if (hamburgerBtn) {
                hamburgerBtn.addEventListener('click', () => {
                    mobileMenuOpen = true;
                    render();
                });
            }

            // Mobile menu close
            const closeMobile = document.getElementById('closeMobileMenu');
            if (closeMobile) closeMobile.addEventListener('click', () => { mobileMenuOpen = false; render(); });
            const mobileOverlay = document.getElementById('mobileOverlay');
            if (mobileOverlay) mobileOverlay.addEventListener('click', () => { mobileMenuOpen = false; render(); });

            // Page navigation buttons (navbar + mobile menu + footer)
            document.querySelectorAll('[data-page]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const page = btn.dataset.page;
                    navigateToPage(page);
                });
            });

            // Code tab buttons
            document.querySelectorAll('.code-tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    activeCodeTab = btn.dataset.tab;
                    render();
                });
            });

            // Mobile code toggle
            const mobileCodeToggle = document.getElementById('mobileCodeToggle');
            if (mobileCodeToggle) {
                mobileCodeToggle.addEventListener('click', () => {
                    mobileCodeOpen = !mobileCodeOpen;
                    render();
                });
            }

            // Vibe Coding tab buttons
            document.querySelectorAll('.vc-tab').forEach(btn => {
                btn.addEventListener('click', () => {
                    vibeCodingTab = parseInt(btn.dataset.vt);
                    render();
                });
            });

            // FAQ accordion
            document.querySelectorAll('.faq-question').forEach(btn => {
                btn.addEventListener('click', () => {
                    const item = btn.closest('.faq-item');
                    item.classList.toggle('open');
                });
            });

            // Family site dropdown
            const familySiteBtn = document.getElementById('familySiteBtn');
            if (familySiteBtn) {
                familySiteBtn.addEventListener('click', () => {
                    familySiteOpen = !familySiteOpen;
                    render();
                });
            }
        }

        // ===== Navigation =====
        function navigateToPage(page) {
            currentPage = page;
            selectedTerm = null;
            selectedCategoryIndex = null;
            expandedCategoryIndex = null;
            selectedTermIndex = null;
            mobileMenuOpen = false;
            searchModalOpen = false;
            searchTerm = '';
            if (page === 'vibecoding') {
                showVibeCodingInfo = true;
                vibeCodingTab = 0;
            } else {
                showVibeCodingInfo = false;
            }
            window.scrollTo(0, 0);
            render();
        }

        function selectTerm(ci, ti) {
            const data = getData();
            selectedCategoryIndex = ci;
            expandedCategoryIndex = ci;
            selectedTermIndex = ti;
            selectedTerm = data[ci].terms[ti];
            currentPage = 'home';
            searchTerm = '';
            searchModalOpen = false;
            window.scrollTo(0, 0);
            render();
        }

        function goHome() {
            selectedTerm = null;
            selectedCategoryIndex = null;
            expandedCategoryIndex = null;
            selectedTermIndex = null;
            searchTerm = '';
            gridCategory = null;
            currentPage = 'home';
            showVibeCodingInfo = false;
            searchOpen = false;
            searchModalOpen = false;
            mobileMenuOpen = false;
            window.scrollTo(0, 0);
            render();
        }

        function toggleLanguage() {
            language = language === 'ko' ? 'en' : 'ko';
            setCookie('language', language, 365);
            if (selectedTerm && selectedCategoryIndex !== null && selectedTermIndex !== null) {
                const data = getData();
                if (data[selectedCategoryIndex] && data[selectedCategoryIndex].terms[selectedTermIndex]) {
                    selectedTerm = data[selectedCategoryIndex].terms[selectedTermIndex];
                }
            }
            render();
        }

        // ===== Hash Change Handler =====
        window.addEventListener('popstate', () => {
            handleHash();
            render();
        });

        // ===== Init =====
        initTheme();
        handleHash();
        render();
    })();
    </script>
